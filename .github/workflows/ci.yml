name: CI

on:
  push:
    branches: [main]
  pull_request:

# Runs on linux-x86_64 — the deploy arch — so the vendored linux-x86_64 vec0.so
# loads and `bb smoke` actually exercises the prod native-lib path (P1-6).
#
# This is a code-only repo (ADR-014): the real kb/ corpus is not
# shipped, so the retrieval gate (eval:gate, gold set tied to real ULIDs) runs on
# the host, not here. CI drives the full pipeline on the bundled fixture (ingest ->
# index -> search). The hybrid gate (omlx, ADR-013) runs on the host.
#
# The containerized path (Docker + TEI/Gemini) is parked for the future
# hosted phase (ADR-013); its compose-smoke + deploy jobs were removed from this
# workflow and live in git history.
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: latest
          bb: latest

      - name: Cache Clojure deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: deps-${{ hashFiles('deps.edn') }}
          restore-keys: deps-

      # checks
      - name: Format check
        run: bb fmt:check
      - name: Lint
        run: bb lint
      - name: Test
        run: bb test

      # native-lib load on the deploy arch (P0-1): fails if linux-x86_64/vec0.so
      # is missing or the resolver can't find it.
      - name: Smoke (sqlite-vec loads)
        run: bb smoke

      # end-to-end pipeline smoke on the bundled fixture (no embedder, no real corpus)
      - name: Ingest fixture
        run: bb ingest:repo examples/sample-source
      - name: Build index
        run: bb index:rebuild
      - name: Search returns the fixture node with provenance
        run: bb search DemoEval | grep -q DemoEval
